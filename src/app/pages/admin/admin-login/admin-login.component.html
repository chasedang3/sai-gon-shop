<main class="admin-login">
  <div class="admin-login__bg"></div>

  <section class="relative w-full px-4">
    <div class="mx-auto w-full max-w-md">
      <div class="rounded-2xl bg-white/90 backdrop-blur shadow-[0_20px_60px_rgba(15,23,42,0.10)] ring-1 ring-slate-900/5">
        <div class="p-6 sm:p-8">
          <div class="flex items-start justify-between gap-4">
            <div>
              <div class="flex items-center gap-3">
                <div
                  class="flex h-11 w-11 items-center justify-center rounded-xl bg-slate-900 text-white shadow-sm"
                  aria-hidden="true"
                >
                  <svg viewBox="0 0 24 24" class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="2">
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M12 11c1.657 0 3-1.343 3-3S13.657 5 12 5 9 6.343 9 8s1.343 3 3 3z"
                    />
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M6 19a6 6 0 0112 0"
                    />
                  </svg>
                </div>
                <div>
                  <h1 class="text-lg font-semibold tracking-tight text-slate-900">Admin Dashboard</h1>
                  <p class="mt-0.5 text-sm text-slate-600">Đăng nhập để quản lý hệ thống</p>
                </div>
              </div>
            </div>
            <div class="flex items-center gap-2 text-xs text-slate-500">
              <span class="inline-flex h-2 w-2 rounded-full bg-emerald-500/90"></span>
              <span>Secure Area</span>
            </div>
          </div>

          <div *ngIf="errorMessage() as msg" class="mt-5 rounded-xl border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-700">
            {{ msg }}
          </div>

          <form class="mt-6 space-y-5" [formGroup]="form" (ngSubmit)="submit()" autocomplete="off" novalidate>
            <div>
              <label for="email" class="block text-sm font-medium text-slate-700">Email</label>
              <div class="mt-2">
                <input
                  id="email"
                  type="email"
                  inputmode="email"
                  formControlName="email"
                  autocomplete="username"
                  class="block w-full rounded-xl border bg-white px-4 py-3 text-sm text-slate-900 shadow-sm outline-none transition
                    border-slate-200 focus:border-slate-900/40 focus:ring-4 focus:ring-slate-900/10"
                  [class.border-rose-300]="emailCtrl.touched && emailCtrl.invalid"
                  [class.focus:border-rose-400]="emailCtrl.touched && emailCtrl.invalid"
                  [class.focus:ring-rose-50]="emailCtrl.touched && emailCtrl.invalid"
                  placeholder="admin&#64;artgallery.com"
                />
              </div>

              <p class="mt-2 text-xs text-slate-500">
                Mock account: <span class="font-medium">admin&#64;artgallery.com</span> / <span class="font-medium">admin123</span>
              </p>

              <p *ngIf="emailCtrl.touched && emailCtrl.hasError('required')" class="mt-2 text-xs text-rose-600">
                Vui lòng nhập email.
              </p>
              <p *ngIf="emailCtrl.touched && emailCtrl.hasError('email')" class="mt-2 text-xs text-rose-600">
                Email không đúng định dạng.
              </p>
            </div>

            <div>
              <label for="password" class="block text-sm font-medium text-slate-700">Mật khẩu</label>
              <div class="mt-2 relative">
                <input
                  id="password"
                  [type]="passwordVisible() ? 'text' : 'password'"
                  formControlName="password"
                  autocomplete="current-password"
                  class="block w-full rounded-xl border bg-white px-4 py-3 pr-12 text-sm text-slate-900 shadow-sm outline-none transition
                    border-slate-200 focus:border-slate-900/40 focus:ring-4 focus:ring-slate-900/10"
                  [class.border-rose-300]="passwordCtrl.touched && passwordCtrl.invalid"
                  [class.focus:border-rose-400]="passwordCtrl.touched && passwordCtrl.invalid"
                  [class.focus:ring-rose-50]="passwordCtrl.touched && passwordCtrl.invalid"
                  placeholder="Nhập mật khẩu"
                />

                <button
                  type="button"
                  class="absolute inset-y-0 right-2 my-auto inline-flex h-9 w-9 items-center justify-center rounded-lg text-slate-500 transition hover:bg-slate-100 hover:text-slate-700 focus:outline-none focus:ring-4 focus:ring-slate-900/10"
                  (click)="togglePasswordVisibility()"
                  [attr.aria-label]="passwordVisible() ? 'Ẩn mật khẩu' : 'Hiện mật khẩu'"
                >
                  <svg *ngIf="!passwordVisible()" viewBox="0 0 24 24" class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="2">
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                    />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                  </svg>
                  <svg *ngIf="passwordVisible()" viewBox="0 0 24 24" class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="2">
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M3 3l18 18"
                    />
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M10.477 10.478A3 3 0 0012 15a3 3 0 002.121-.879"
                    />
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M7.362 7.561C5.59 8.82 4.279 10.573 3.543 12c1.274 4.057 5.065 7 9.542 7 1.568 0 3.066-.361 4.406-1.006"
                    />
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M14.12 9.88A3 3 0 009 12c0 .524.134 1.016.369 1.445"
                    />
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M20.457 12c-.63 2.007-2.027 3.83-3.957 5.04"
                    />
                  </svg>
                </button>
              </div>

              <p *ngIf="passwordCtrl.touched && passwordCtrl.hasError('required')" class="mt-2 text-xs text-rose-600">
                Vui lòng nhập mật khẩu.
              </p>
            </div>

            <button
              type="submit"
              class="relative inline-flex w-full items-center justify-center gap-2 rounded-xl bg-slate-900 px-4 py-3 text-sm font-semibold text-white shadow-sm transition
                hover:bg-slate-800 focus:outline-none focus:ring-4 focus:ring-slate-900/20 disabled:cursor-not-allowed disabled:opacity-60"
              [disabled]="!canSubmit()"
            >
              <span *ngIf="state() !== 'loading'">Đăng nhập</span>

              <span *ngIf="state() === 'loading'" class="inline-flex items-center gap-2">
                <span class="admin-login__spinner" aria-hidden="true"></span>
                Đang đăng nhập...
              </span>
            </button>

            <div class="flex items-center justify-between">
              <a
                class="text-xs font-medium text-slate-600 transition hover:text-slate-900"
                [routerLink]="['/']"
              >
                ← Về trang chủ
              </a>
              <a class="text-xs font-medium text-slate-600 transition hover:text-slate-900" href="#" (click)="$event.preventDefault()">
                Quên mật khẩu?
              </a>
            </div>
          </form>

          <div class="mt-6 border-t border-slate-200/70 pt-4 text-xs text-slate-500">
            Chỉ dành cho quản trị viên. Mọi truy cập trái phép có thể bị ghi nhận.
          </div>
        </div>
      </div>
    </div>
  </section>
</main>
